<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark green background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#091a0f"/>
  <!-- Pitch outline -->
  <rect x="3.5" y="5.5" width="25" height="21" rx="1.5" stroke="white" stroke-width="1.2"/>
  <!-- Halfway line -->
  <line x1="3.5" y1="16" x2="28.5" y2="16" stroke="white" stroke-width="1.2"/>
  <!-- Center circle -->
  <circle cx="16" cy="16" r="4.5" stroke="white" stroke-width="1.2"/>
  <!-- Center spot — lime accent -->
  <circle cx="16" cy="16" r="1.4" fill="#a3e635"/>
  <!-- Top penalty box -->
  <rect x="9.5" y="5.5" width="13" height="5" stroke="white" stroke-width="0.8"/>
  <!-- Bottom penalty box -->
  <rect x="9.5" y="21.5" width="13" height="5" stroke="white" stroke-width="0.8"/>
</svg>
